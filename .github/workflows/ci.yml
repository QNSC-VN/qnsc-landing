# =============================================================================
# CI — fast quality gates on every PR and push to main
# Gate: lint → typecheck → build → pr-title
# Security scans (Gitleaks, CodeQL) live in security.yml — independently runnable.
# =============================================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.33.2'

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Lint + typecheck (fast gate — no deps needed)
  # ─────────────────────────────────────────────────────────────────────────
  quality:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: QNSC-VN/qnsc-ci/actions/setup-node-pnpm@v1.4
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Lint
        run: pnpm lint

      - name: Typecheck (Astro check + content collection schema)
        run: pnpm typecheck

  # ─────────────────────────────────────────────────────────────────────────
  # 2. Build — verifies the static output compiles cleanly (Astro + Sharp
  #    image pipeline + sitemap). Publishes dist/ for the deploy job to reuse
  #    so it's never rebuilt with different inputs than what was checked here.
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [quality]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: QNSC-VN/qnsc-ci/actions/setup-node-pnpm@v1.4
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Build
        run: pnpm build
        env:
          # Placeholder during CI build check — deploy.yml rebuilds with the
          # real Lambda Function URL baked in for the target environment.
          PUBLIC_CONTACT_FORM_URL: https://example.invalid/ci-placeholder

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 3

  # ─────────────────────────────────────────────────────────────────────────
  # 3. PR title — enforce Conventional Commits format on PR titles.
  #    Required because release-please derives CHANGELOG from PR titles.
  # ─────────────────────────────────────────────────────────────────────────
  pr-title:
    name: PR title (conventional commits)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 5
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            style
            refactor
            perf
            security
            test
            build
            ci
            deps
            revert
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" must start with a lowercase letter.

  # Security scans (Gitleaks, CodeQL) → security.yml
