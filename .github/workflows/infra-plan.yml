# =============================================================================
# OpenTofu Plan — dry-run on every PR that touches infra/.
#
# Requires the Lambda's node_modules to exist before `archive_file` can zip a
# real deployment package — installed here, not committed to the repo.
# =============================================================================
name: OpenTofu Plan

on:
  pull_request:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/infra-plan.yml'

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  TOFU_VERSION: '1.9.1'
  AWS_REGION: ap-southeast-1

jobs:
  plan:
    name: Plan prod
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production-plan

    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1.0.8
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: Install Lambda dependencies
        working-directory: infra/modules/contact-form/lambda
        run: npm install --omit=dev

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/qnsc-landing-github-infra-plan
          aws-region: ${{ env.AWS_REGION }}

      - name: tofu init
        working-directory: infra/live/prod
        run: tofu init -input=false

      - name: tofu validate
        working-directory: infra/live/prod
        run: tofu validate

      - name: tofu plan
        id: plan
        working-directory: infra/live/prod
        run: tofu plan -input=false -no-color 2>&1 | tee plan.txt
        continue-on-error: true

      - name: Post plan comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/live/prod/plan.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.substring(0, 60000) + '\n\n... (truncated)'
              : plan;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### OpenTofu Plan — \`infra/live/prod\`\n\`\`\`hcl\n${truncated}\n\`\`\``,
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
