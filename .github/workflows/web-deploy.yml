# =============================================================================
# Web · Deploy — thin caller of the shared reusable (qnsc-ci).
#
# 1-env static site: merge to main -> build + publish to Cloudflare Pages via
# the shared workflow (build runs in CI, not Cloudflare's builder). No release
# tag needed. No approval gate (public marketing site).
#
# PREREQUISITE: disable Cloudflare's GitHub auto-build for this Pages project
# so it doesn't double-deploy. Requires repo secrets CLOUDFLARE_API_TOKEN +
# CLOUDFLARE_ACCOUNT_ID and env var PAGES_PROJECT (+ optional APP_URL).
#
# NOTE: optional migration. Staying on Cloudflare GitHub auto-build is also fine
# for a brochure (free per-PR previews). Adopt this only for build provenance +
# one control plane / secrets store.
# =============================================================================
name: Web · Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    uses: QNSC-VN/qnsc-ci/.github/workflows/web-deploy.yml@v1
    with:
      product: qnsc-landing
      build_command: pnpm build
      web_dist_path: dist
      single_environment: production
    secrets: inherit
