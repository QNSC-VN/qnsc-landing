# =============================================================================
# Web · Deploy — thin caller of the shared reusable (qnsc-ci).
#
# 1-env static site: merge to main -> build + publish to Cloudflare Pages via
# the shared workflow (build runs in CI, not Cloudflare's builder). No release
# tag needed. No approval gate (public marketing site).
#
# PREREQUISITE: disable Cloudflare's GitHub auto-build for this Pages project so
# CI is the single source of deploys (no double-deploy). Cloudflare creds come
# from ORG secrets CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID; the Pages
# project name from the PAGES_PROJECT var (+ optional APP_URL for the
# post-deploy health check).
# =============================================================================
name: Web · Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    uses: QNSC-VN/qnsc-ci/.github/workflows/web-deploy.yml@v1.4.0
    with:
      product: qnsc-landing
      build_command: pnpm build
      web_dist_path: dist
      single_environment: production
    # Least-privilege: pass only what the reusable declares (no `secrets: inherit`).
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      SLACK_DEPLOY_WEBHOOK: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
