# =============================================================================
# Security — thin caller of the shared reusable suite (qnsc-ci).
#
# qnsc-landing is Cloudflare-native (Astro static + one Pages Function, no
# Dockerfile), so it calls the shared workflow with `scan_container: false`:
# the Trivy container-CVE job is skipped while Semgrep (SAST, replaces CodeQL),
# Gitleaks (secrets, MIT CLI) and osv-scanner (dependency CVEs, replaces
# dependency-review) still run source-based. This gives the same security gate
# as the rally/opshub products, so posture is uniform across the org.
# =============================================================================
name: Security · Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1' # weekly Monday 04:00 UTC — catch new CVEs between pushes

permissions:
  contents: read
  security-events: write # SARIF upload (no-op on the free plan, lights up after GHAS)

jobs:
  security:
    uses: QNSC-VN/qnsc-ci/.github/workflows/security.yml@v1.4.0
    with:
      product: qnsc-landing
      scan_container: false # no Dockerfile — skip Trivy, keep Semgrep + Gitleaks + osv
      node_version: '22'
    secrets: inherit
