# =============================================================================
# Deploy — Build Astro static output, sync to S3
#
# No CloudFront invalidation step: this site is fronted by Cloudflare (proxied
# DNS), which handles TLS/CDN/caching at the edge and purges on its own —
# see infra/README.md for why we didn't stack CloudFront behind it too.
#
# Trigger: push to main (single "production" environment — this is a
# marketing site with no develop/staging split).
#
# Authentication: GitHub OIDC → AWS IAM (no stored AWS keys).
#
# Prerequisites (GitHub environment "production"):
#   Repository secrets:
#     AWS_ACCOUNT_ID           12-digit, no hyphens
#     SLACK_DEPLOY_WEBHOOK     Slack / Discord incoming webhook (optional)
#
#   Environment variables:
#     AWS_REGION               e.g. ap-southeast-1
#     S3_BUCKET                e.g. qnsc-landing-prod
#     APP_URL                  e.g. https://qnsc.vn (for post-deploy health check)
#     PUBLIC_CONTACT_FORM_URL  Lambda Function URL from infra/live/prod outputs
#
#   IAM role (provisioned by infra/live/prod — modules/contact-form + a
#   dedicated github-deploy role scoped to s3:PutObject/DeleteObject on the
#   qnsc-landing-prod bucket only):
#     qnsc-landing-github-deploy-production
# =============================================================================
name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false # never cancel a running deploy

permissions:
  contents: read

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.33.2'

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    permissions:
      id-token: write # OIDC
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: QNSC-VN/qnsc-ci/actions/setup-node-pnpm@v1.4
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      # ── Build ──────────────────────────────────────────────────────────────
      # PUBLIC_ vars are baked into the static output at build time.
      - name: Build
        run: pnpm build
        env:
          PUBLIC_CONTACT_FORM_URL: ${{ vars.PUBLIC_CONTACT_FORM_URL }}

      # ── Configure AWS (OIDC) ──────────────────────────────────────────────
      - name: Setup AWS OIDC
        uses: QNSC-VN/qnsc-ci/actions/setup-aws-oidc@v1.4
        with:
          role-arn: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/qnsc-landing-github-deploy-production
          region: ${{ vars.AWS_REGION }}

      # ── Sync to S3 ────────────────────────────────────────────────────────
      # Astro hashes every asset under /_astro/, so those are safe to cache
      # forever. index.html (and any other loose page) is never cached so
      # visitors always get the entry point that references the latest hashes.
      - name: Sync dist to S3
        run: |
          aws s3 sync dist/ s3://${{ vars.S3_BUCKET }}/ \
            --delete \
            --exclude "*.html" \
            --cache-control "public, max-age=31536000, immutable" \
            --region "${{ vars.AWS_REGION }}"

          aws s3 sync dist/ s3://${{ vars.S3_BUCKET }}/ \
            --delete \
            --exclude "*" --include "*.html" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html" \
            --region "${{ vars.AWS_REGION }}"

      # ── Health check — confirm the new version is serving ─────────────────
      # Cloudflare purges its edge cache on its own schedule/API, not something
      # this job controls, so this just confirms origin (S3, via Cloudflare)
      # is responding — not that every edge PoP has the newest copy yet.
      - name: Post-deploy health check
        if: vars.APP_URL != ''
        uses: QNSC-VN/qnsc-ci/actions/post-deploy-health-check@v1.4
        with:
          url: ${{ vars.APP_URL }}
          expected-status: '200'
          timeout-seconds: '60'

      # ── Job summary ───────────────────────────────────────────────────────
      - name: Deployment summary
        if: always()
        run: |
          STATUS="${{ job.status }}"
          echo "### Deploy $STATUS — production" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **S3 bucket** | \`${{ vars.S3_BUCKET }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Actor** | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"

      # ── Notify Slack / Discord (always — even on failure) ─────────────────
      - name: Notify deploy result
        if: always()
        uses: QNSC-VN/qnsc-ci/actions/notify-deploy@v1.4
        with:
          webhook-url: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
          status: ${{ job.status == 'success' && 'success' || 'failure' }}
          service: qnsc-landing
          environment: production
          version: ${{ github.sha }}
