# =============================================================================
# Release Please — auto-creates a "chore(release): vX.Y.Z" PR on every
# main push, then auto-tags when that PR is merged.
#
# Unlike rally/opshub, merging the release PR here does not gate a deploy —
# web-deploy.yml already runs on every push to main. This workflow exists purely
# for changelog + semver bookkeeping on a site that ships continuously.
#
# Requires: RELEASE_BOT_APP_ID (org var) + RELEASE_BOT_PRIVATE_KEY (org secret).
# =============================================================================
name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-please
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  # Delegate to the shared reusable so pinning/behaviour stays in one place
  # (QNSC-VN/qnsc-ci). config_file defaults to release-please-config.json.
  # No secrets passed: this repo has no RELEASE_BOT_PRIVATE_KEY, so the reusable
  # falls back to github.token (avoids `secrets: inherit` least-privilege risk).
  release:
    uses: QNSC-VN/qnsc-ci/.github/workflows/release-please.yml@v1.3.0
